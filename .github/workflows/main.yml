name: Win RDP via cloudflared

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download cloudflared
      run: Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"

    - name: Enable TS
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server'-name "fDenyTSConnections" -Value 0
    - run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
    - run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd!" -Force)

    - name: Start tunnel
      run: |
        Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel","--no-autoupdate","--url","tcp://localhost:3389" -NoNewWindow -RedirectStandardOutput "cf.log" -RedirectStandardError "cf.err.log"

        $deadline = (Get-Date).AddSeconds(45)
        $url = $null
        while ((Get-Date) -lt $deadline -and -not $url) {
          Start-Sleep -Seconds 2
          $content = (Get-Content "cf.log","cf.err.log" -Raw -ErrorAction SilentlyContinue) -join "`n"
          if ($content -match '(?:https?://)?([a-z0-9-]+\.trycloudflare\.com)') {
            $url = "$($Matches[1]):3389"
          }
        }
        if (-not $url) { throw "cloudflared tunnel did not start" }

        Write-Host "========================================="
        Write-Host "RDP Host: $url"
        Write-Host "Username: runneradmin"
        Write-Host "Password: P@ssw0rd!"
        Write-Host "========================================="

        Start-Sleep -Seconds 3600

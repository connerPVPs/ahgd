name: CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2019

    steps:
    - name: Download
      run: Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
    - name: Extract
      run: Expand-Archive ngrok.zip
    - name: Auth
      run: .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Enable TS
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server'-name "fDenyTSConnections" -Value 0
    - run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
    - run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "admin123@" -Force)
    - name: Create Tunnel
      run: |
        Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp","3389" -NoNewWindow

        $deadline = (Get-Date).AddSeconds(30)
        $url = $null
        while ((Get-Date) -lt $deadline -and -not $url) {
          Start-Sleep -Seconds 2
          try {
            $api = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction SilentlyContinue
            if ($api.tunnels.Count -gt 0) {
              $url = $api.tunnels[0].public_url -replace '^tcp://',''
            }
          } catch {}
        }
        if (-not $url) { throw "ngrok did not come up" }

        Write-Host "==========================================="
        Write-Host "Windows RDP Server is LIVE!"
        Write-Host ""
        Write-Host "RDP Host: $url"
        Write-Host "Username: runneradmin"
        Write-Host "Password: P@ssw0rd!"
        Write-Host "==========================================="

        Start-Sleep -Seconds 3600

name: CI SSH Tunnel

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Install SSH and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server

    - name: Configure User Password
      run: |
        # Sets the password for the default 'runner' user to 'P@ssw0rd!'
        echo "runner:P@ssw0rd!" | sudo chpasswd

    - name: Download and Install Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.data/ngrok.list
        sudo apt-get update
        sudo apt-get install ngrok

    - name: Authenticate Ngrok
      run: ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Start SSH Tunnel
      run: ngrok tcp 22


name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download & extract ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          if ((Get-Item ngrok.zip).Length -lt 1MB) { throw "ngrok download appears to have failed (file too small)" }
          Expand-Archive ngrok.zip -Force
          $ngrok = Get-ChildItem -Recurse -Filter ngrok.exe | Select-Object -First 1
          if (-not $ngrok) { throw "ngrok.exe not found after extraction" }
          Move-Item $ngrok.FullName -Destination .\ngrok.exe -Force
          .\ngrok.exe --version

      - name: Authenticate ngrok
        run: .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable RDP & clear password
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Lsa' -Name "LimitBlankPasswordUse" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

          # Relax local password policy so a blank password is allowed
          $cfg = @(
            '[Version]',
            'signature="$CHICAGO$"',
            'Revision=1',
            '',
            '[System Access]',
            'MinimumPasswordLength = 0',
            'PasswordComplexity = 0'
          )
          $cfg | Out-File -Encoding unicode C:\sec.cfg
          secedit /configure /db C:\windows\security\local.sdb /cfg C:\sec.cfg /areas SECURITYPOLICY
          gpupdate /force

          # Set runneradmin password to empty
          $user = [ADSI]"WinNT://localhost/runneradmin"
          $user.SetPassword("")

      - name: Start ngrok tunnel & save connection info
        run: |
          Start-Process -NoNewWindow -FilePath ".\ngrok.exe" -ArgumentList "tcp","--region","in","3389" -RedirectStandardOutput ngrok.log -RedirectStandardError ngrok.err
          Start-Sleep -Seconds 3
          $found = $false
          for ($i = 0; $i -lt 60; $i++) {
            $ngrokProcess = Get-Process ngrok -ErrorAction SilentlyContinue
            if (-not $ngrokProcess) {
              Write-Host "WARNING: ngrok process is not running."
            }
            try {
              $tunnels = Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
              $tcp = $tunnels.tunnels | Where-Object { $_.proto -eq 'tcp' } | Select-Object -First 1
              if ($tcp) {
                $address = $tcp.public_url -replace '^tcp://',''
                Write-Host "=========================================="
                Write-Host "RDP Address : $address"
                Write-Host "Username    : runneradmin"
                Write-Host "Password    : (blank - leave empty)"
                Write-Host "=========================================="
                $address | Out-File -FilePath tcp_url.txt -Encoding utf8 -NoNewline
                $found = $true
                break
              }
            } catch {
              Write-Host "Waiting for ngrok API... ($i)"
            }
            if (Test-Path ngrok.log) {
              $lastLog = Get-Content ngrok.log -Tail 5
              Write-Host "Recent ngrok log:"
              $lastLog | ForEach-Object { Write-Host $_ }
            }
            Start-Sleep -Seconds 2
          }
          if (-not $found) {
            if (Test-Path ngrok.err) {
              Write-Host "===== ngrok stderr ====="
              Get-Content ngrok.err | ForEach-Object { Write-Host $_ }
            }
            throw "Failed to get ngrok tunnel URL"
          }

      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: connection-info
          path: tcp_url.txt
          retention-days: 1

      - name: Keep session alive
        run: |
          Write-Host "RDP session is active. Workflow will run for up to 6 hours."
          Write-Host "Cancel this workflow from GitHub when you are done."
          while ($true) { Start-Sleep -Seconds 60 }

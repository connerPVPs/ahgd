name: Win10 RDP Server (ngrok)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-Service TermService -StartupType 'Automatic'
          Restart-Service TermService -Force
          Start-Sleep -Seconds 3

      - name: Configure User
        shell: powershell
        run: |
          net user runneradmin admin123@
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators"      -Member "runneradmin" -ErrorAction SilentlyContinue

      - name: Download ngrok
        shell: powershell
        run: |
          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
          .\ngrok.exe version

      - name: Authenticate ngrok
        shell: powershell
        run: .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok TCP tunnel
        shell: powershell
        run: |
          Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp","3389","--log=stdout" `
            -RedirectStandardOutput "ngrok.log" -NoNewWindow

          # Wait for the public URL to appear on the local API
          $timeout = (Get-Date).AddSeconds(30)
          $url = $null
          while ((Get-Date) -lt $timeout -and -not $url) {
            Start-Sleep -Seconds 2
            try {
              $api = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction SilentlyContinue
              if ($api.tunnels.Count -gt 0) {
                $url = $api.tunnels[0].public_url -replace '^tcp://',''
              }
            } catch {}
          }
          if (-not $url) { throw "ngrok did not report a tunnel" }
          Add-Content "ngrok-url.txt" $url

      - name: Show connection info
        shell: powershell
        run: |
          $url = (Get-Content "ngrok-url.txt" -Raw).Trim()
          Write-Host "========================================="
          Write-Host "Windows RDP Server is LIVE!"
          Write-Host ""
          Write-Host "RDP Host: $url"
          Write-Host "Username: runneradmin"
          Write-Host "Password: admin123@"
          Write-Host "========================================="

      - name: Keep alive
        shell: powershell
        run: Start-Sleep -Seconds 3600
